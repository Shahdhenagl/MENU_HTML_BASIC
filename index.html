<meta charset="UTF-8" />

<title>ALMOATAMD — Menu</title>

<style>
  :root{
    --maroon:#6d1224;
    --maroon2:#8a1c2e;
    --teal:#15535d;
    --warm:#e0956e;
    --cream:#fbf6f0;
    --ink:#33292a;
    --muted:#a08876;
    --line:#ecdbcb;
    --card:#fffdfb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Quicksand','Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;
    background:linear-gradient(180deg,#fdf9f4 0%, #f8ecdf 48%, #f0d8c5 100%) fixed;
    min-height:100vh;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 16px 60px}

  /* ===== Brand ===== */
  header{text-align:center;padding:38px 16px 22px}
  .logo{width:82px;height:82px;margin:0 auto 12px;color:var(--maroon);
    filter:drop-shadow(0 6px 13px rgba(109,18,36,.20))}
  .logo svg{width:100%;height:100%;display:block}
  .brand-ar{font-family:'Cairo',sans-serif;font-weight:800;font-size:1.35rem;color:var(--maroon);letter-spacing:2px;margin-bottom:-2px}
  .brand-en{font-family:'Poppins',sans-serif;font-weight:800;font-size:2.3rem;letter-spacing:6px;color:var(--maroon);line-height:1.05}
  .tagline{font-family:'Poppins',sans-serif;font-style:italic;color:var(--warm);font-weight:600;letter-spacing:1px;font-size:.85rem;margin-top:6px}
  @media(min-width:560px){ .brand-en{font-size:2.9rem} .logo{width:96px;height:96px} }

  /* ===== Sticky tabs + nav ===== */
  .topbar{position:sticky;top:0;z-index:30;background:rgba(253,249,244,.94);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);margin-bottom:24px}
  .tabs{display:flex;justify-content:center;gap:10px;padding:11px 14px 7px}
  .tabs button{flex:1 1 0;max-width:220px;font-family:'Poppins',sans-serif;font-size:.92rem;font-weight:700;
    letter-spacing:2px;cursor:pointer;color:var(--maroon);background:transparent;
    border:1.6px solid rgba(109,18,36,.30);border-radius:999px;padding:9px 20px;transition:.2s}
  .tabs button:hover{border-color:var(--maroon)}
  .tabs button.active{color:#fff;background:linear-gradient(180deg,var(--maroon2),var(--maroon));
    border-color:var(--maroon);box-shadow:0 6px 15px rgba(109,18,36,.30)}
  nav{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding:4px 14px 11px;
    scrollbar-width:thin;scrollbar-color:var(--warm) transparent;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{height:5px}
  nav::-webkit-scrollbar-thumb{background:var(--warm);border-radius:10px}
  nav a{flex:0 0 auto;color:var(--teal);text-decoration:none;font-family:'Poppins',sans-serif;font-weight:600;font-size:.8rem;
    padding:7px 14px;border:1px solid var(--line);border-radius:999px;white-space:nowrap;background:var(--card);transition:.2s}
  nav a:hover{border-color:var(--warm)}
  nav a.active{color:#fff;background:var(--teal);border-color:var(--teal)}

  /* ===== Section band ===== */
  .band{max-width:720px;margin:6px auto 24px;padding:22px 20px;border-radius:18px;text-align:center;color:#fff;scroll-margin-top:118px;
    background:linear-gradient(115deg,var(--maroon) 0%, var(--maroon2) 42%, var(--warm) 118%);
    box-shadow:0 12px 28px rgba(109,18,36,.20)}
  .band h2{font-family:'Poppins',sans-serif;font-weight:800;letter-spacing:5px;font-size:1.8rem}
  .band .ar{font-family:'Cairo',sans-serif;font-weight:700;opacity:.9;font-size:.95rem;margin-top:2px}

  /* ===== Category ===== */
  .cat{max-width:720px;margin:0 auto 30px;scroll-margin-top:112px}
  .cat-head{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
  .cat-head .c-main{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.35rem;letter-spacing:1px;
    color:var(--maroon);text-transform:uppercase;white-space:nowrap}
  .cat-head .c-sub{font-family:'Cairo',sans-serif;font-weight:700;font-size:.85rem;color:var(--warm);white-space:nowrap}
  .cat-head .line{flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,rgba(109,18,36,.32),transparent)}

  .price-key{display:flex;justify-content:flex-end;padding:0 2px 5px}
  .price-key span{width:var(--pw,50px);text-align:center;font-family:'Poppins',sans-serif;font-size:.64rem;font-weight:800;
    color:var(--maroon);letter-spacing:.5px;border-bottom:1.5px solid rgba(109,18,36,.55);padding-bottom:2px}

  .items{display:flex;flex-direction:column}
  .item{display:flex;align-items:baseline;gap:12px;padding:8px 2px;border-bottom:1px dashed var(--line)}
  .item .nm{flex:1;min-width:0}
  .item .na{font-family:'Quicksand','Cairo',sans-serif;font-weight:700;font-size:1rem;color:var(--teal);line-height:1.3}
  .item .ne{font-family:'Cairo',sans-serif;font-size:.76rem;color:var(--muted);margin-top:1px}
  .cells{display:flex;flex:0 0 auto}
  .cells .c{width:var(--pw,50px);text-align:center;font-family:'Poppins',sans-serif;font-weight:700;color:var(--teal);font-size:1rem}
  .cells .c.dash{color:var(--muted);opacity:.5}
  .inline{display:flex;gap:12px;flex:0 0 auto;align-items:baseline}
  .pp{font-family:'Poppins',sans-serif;color:var(--teal);font-weight:700;font-size:1rem;white-space:nowrap}
  .pp b{color:var(--maroon);font-weight:800;font-size:.58rem;letter-spacing:.5px;margin-inline-end:3px;vertical-align:middle;opacity:.85}

  .soon{max-width:720px;margin:0 auto 40px;padding:28px 18px;text-align:center;color:var(--muted);
    border:1px dashed var(--line);border-radius:16px;font-weight:600}

  .status{text-align:center;color:var(--muted);padding:60px 16px;font-weight:600}
  .status .spin{width:32px;height:32px;margin:0 auto 14px;border-radius:50%;
    border:3px solid var(--line);border-top-color:var(--maroon);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== Footer (with Instagram) ===== */
  footer{text-align:center;padding:36px 16px 16px;border-top:1px solid var(--line);margin-top:26px}
  .foot-logo{width:52px;height:52px;margin:0 auto 8px;color:var(--maroon);opacity:.85}
  .foot-logo svg{width:100%;height:100%}
  .foot-brand{font-family:'Poppins',sans-serif;font-weight:800;letter-spacing:3px;color:var(--maroon);font-size:1rem}
  .foot-tag{color:var(--warm);font-style:italic;font-size:.8rem;font-weight:600;margin-top:2px}
  .ig{display:inline-flex;align-items:center;gap:7px;margin-top:14px;color:#fff;font-family:'Poppins',sans-serif;
    font-weight:700;font-size:.82rem;text-decoration:none;letter-spacing:.5px;
    background:linear-gradient(120deg,var(--maroon2),var(--maroon));padding:8px 18px;border-radius:999px;
    box-shadow:0 5px 14px rgba(109,18,36,.28)}
  .ig svg{width:16px;height:16px}
  .foot-note{color:var(--muted);font-size:.76rem;margin-top:14px}
  .exp{display:block;margin:12px auto 0;color:var(--muted);font-size:.74rem;text-decoration:underline;cursor:pointer;background:none;border:0;font-family:inherit}
  .exp:hover{color:var(--maroon)}

  @media(max-width:559px){
    .wrap{padding:0 12px 40px}
    header{padding:26px 14px 16px}
    .brand-en{font-size:2rem;letter-spacing:4px}
    .band{padding:18px 16px} .band h2{font-size:1.45rem;letter-spacing:3px}
    .cat-head .c-main{font-size:1.15rem}
    .cat-head .c-sub{font-size:.75rem}
    .tabs button{padding:9px 10px;letter-spacing:1px;font-size:.86rem}
    .item{padding:8px 1px;gap:8px}
    .item .na{font-size:.92rem}
    .cells .c,.pp{font-size:.92rem}
    :root{ --pw-mobile:1 }
  }
</style>
</head>

const DEFAULT_DATA = { SECTIONS:DEFAULT_SECTIONS, CATS:DEFAULT_CATS, PRODUCTS:DEFAULT_PRODUCTS };

/* ============================================================
   قراءة البيانات من جوجل شيت
   ============================================================ */
function buildUrl(){
  const bust='_cb='+Date.now();
  if(CONFIG.SHEET_CSV_URL) return CONFIG.SHEET_CSV_URL+(CONFIG.SHEET_CSV_URL.includes('?')?'&':'?')+bust;
  if(CONFIG.SHEET_ID) return 'https://docs.google.com/spreadsheets/d/'+CONFIG.SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(CONFIG.SHEET_NAME||'')+'&'+bust;
  return '';
}
function parseCSV(text){
  const rows=[]; let row=[]; let field=''; let inQ=false;
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; } else field+=ch; }
    else { if(ch==='"') inQ=true; else if(ch===','){ row.push(field); field=''; } else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=''; } else field+=ch; }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(c=>(c||'').trim()!==''));
}
function normHeader(h){ return (h||'').trim().toLowerCase().replace(/[\s_\-]+/g,''); }
const FIELD_OF = {
  'section':'section','sec':'section','القسم':'section','القسمالرئيسي':'section',
  'category':'category_ar','categoryar':'category_ar','cat':'category_ar','التصنيف':'category_ar','الصنف':'category_ar','المجموعة':'category_ar',
  'categoryen':'category_en','categoryenglish':'category_en',
  'name':'name_ar','namear':'name_ar','الاسم':'name_ar','المنتج':'name_ar','الاسمعربي':'name_ar',
  'nameen':'name_en','english':'name_en','nameenglish':'name_en','الاسمانجليزي':'name_en',
  'prices':'prices','price':'prices','p':'prices','السعر':'prices','الاسعار':'prices','الأسعار':'prices',
  'available':'available','avail':'available','متاح':'available','الحالة':'available','status':'available',
};
function isHidden(v){ if(!v) return false; const n=v.trim().toLowerCase().replace(/\s+/g,''); return ['no','false','0','hide','hidden','off','لا','مخفي','مخفى','غيرمتاح','stop'].includes(n); }
function normSection(v){
  const raw=(v||'').trim(); const n=raw.toLowerCase();
  if(n==='beans'||raw.includes('بن')||raw.includes('حبوب')) return {id:'beans', ar:'حبوب البُن', en:'BEANS'};
  if(n==='drinks'||n==='drink'||raw.includes('مشروب')) return {id:'drinks', ar:'المشروبات', en:'DRINKS'};
  if(!raw) return {id:'drinks', ar:'المشروبات', en:'DRINKS'};
  return {id:'sec_'+n.replace(/\s+/g,'_'), ar:raw, en:raw.toUpperCase()};
}
function rowsToData(rows){
  if(!rows||rows.length<2) return null;
  const header=rows[0].map(normHeader); const idx={};
  header.forEach((h,i)=>{ const f=FIELD_OF[h]; if(f&&idx[f]===undefined) idx[f]=i; });
  if(idx.name_ar===undefined && idx.name_en===undefined) return null;
  const sectionsMap=new Map(); const cats=[]; const catKey=new Map(); const products=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; const get=f=>(idx[f]!==undefined?(row[idx[f]]||''):'').trim();
    const nameAr=get('name_ar'), nameEn=get('name_en');
    if(!nameAr && !nameEn) continue;
    if(isHidden(get('available'))) continue;
    const sec=normSection(get('section')||'drinks');
    if(!sectionsMap.has(sec.id)) sectionsMap.set(sec.id, sec);
    const catAr=get('category_ar')||'Other'; const catEn=get('category_en');
    const key=sec.id+'||'+catAr+'||'+catEn;
    let catId=catKey.get(key);
    if(!catId){ catId='c'+cats.length; catKey.set(key,catId); cats.push({id:catId, s:sec.id, ar:catAr, en:catEn}); }
    products.push({c:catId, ar:nameAr, en:nameEn, pr:get('prices')});
  }
  if(!products.length) return null;
  return {SECTIONS:[...sectionsMap.values()], CATS:cats, PRODUCTS:products};
}
async function loadData(){
  const url=buildUrl(); if(!url) return DEFAULT_DATA;
  try{
    const res=await fetch(url,{cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status);
    const data=rowsToData(parseCSV(await res.text())); return data||DEFAULT_DATA;
  }catch(e){ console.warn('تعذّر تحميل جوجل شيت — عرض البيانات الافتراضية.', e); return DEFAULT_DATA; }
}

/* ============================================================
   العرض
   ============================================================ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function slugify(s){ return String(s||'').trim().toLowerCase().replace(/[^\w؀-ۿ]+/g,'-').replace(/^-+|-+$/g,'')||'x'; }
function parsePrices(str){
  if(str==null) return [];
  return String(str).split('|').map(s=>s.trim()).filter(Boolean).map(seg=>{
    const parts=seg.split(/\s+/);
    if(parts.length>=2) return {label:parts.slice(0,-1).join(' '), value:parts[parts.length-1]};
    return {label:'', value:parts[0]};
  }).filter(x=>x.value && x.value!=='-');
}

function initMenu(data){
  const SECTIONS=data.SECTIONS, CATS=data.CATS, PRODUCTS=data.PRODUCTS;
  const mark=document.getElementById('mark').innerHTML;
  document.getElementById('logo').innerHTML=mark;
  document.getElementById('footLogo').innerHTML=mark;

  const nav=document.getElementById('nav');
  const menu=document.getElementById('menu'); menu.innerHTML='';
  const navLinks={}; const sections=[];
  const used=new Set(); const secSlug={}; const slugSec={};
  SECTIONS.forEach(s=>{ let sl=slugify(s.en||s.ar); while(used.has(sl)) sl+='-x'; used.add(sl); secSlug[s.id]=sl; slugSec[sl]=s.id; });

  function goTo(slug){ const el=document.getElementById(slug); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }
  function setHash(slug){ if(('#'+slug)!==location.hash){ try{ history.replaceState(null,'','#'+slug); }catch(e){} } }

  function renderCategory(cat){
    const items=PRODUCTS.filter(p=>p.c===cat.id);
    if(!items.length) return;

    let slug=(secSlug[cat.s]||'x')+'-'+slugify(cat.en||cat.ar); while(used.has(slug)) slug+='-x'; used.add(slug);

    const a=document.createElement('a');
    a.href='#'+slug; a.textContent=cat.en||cat.ar; a.dataset.slug=slug;
    navLinks[slug]=a; nav.appendChild(a);

    const sec=document.createElement('section'); sec.className='cat'; sec.id=slug;

    // parse prices; decide header (dominant labeled size-sequence)
    const parsed=items.map(p=>({p, pr:parsePrices(p.pr)}));
    const seqCount={};
    parsed.forEach(x=>{ const ls=x.pr.filter(pp=>pp.label).map(pp=>pp.label); if(ls.length){ const k=ls.join('|'); seqCount[k]=(seqCount[k]||0)+1; } });
    let headerLabels=[]; let best=-1;
    Object.keys(seqCount).forEach(k=>{ const arr=k.split('|'); const c=seqCount[k]; if(c>best||(c===best&&arr.length>headerLabels.length)){ best=c; headerLabels=arr; } });

    // column width
    let wide=headerLabels.some(l=>l.length>2);
    parsed.forEach(x=>x.pr.forEach(pp=>{ if((pp.value||'').length>3||(pp.label||'').length>2) wide=true; }));
    sec.style.setProperty('--pw', (wide?68:50)+'px');

    // head
    const head=document.createElement('div'); head.className='cat-head';
    head.innerHTML='<span class="c-main">'+esc(cat.en||cat.ar)+'</span>'+(cat.ar&&cat.en?'<span class="c-sub">'+esc(cat.ar)+'</span>':'')+'<span class="line"></span>';
    sec.appendChild(head);

    // size header row
    if(headerLabels.length){
      const key=document.createElement('div'); key.className='price-key';
      key.innerHTML=headerLabels.map(l=>'<span>'+esc(l)+'</span>').join('');
      sec.appendChild(key);
    }

    const list=document.createElement('div'); list.className='items';
    parsed.forEach(x=>{
      const p=x.p, pr=x.pr;
      const primary=p.en||p.ar||''; const secondary=p.en?(p.ar||''):'';
      const itemLabels=pr.filter(pp=>pp.label).map(pp=>pp.label);
      const hasLabels=itemLabels.length>0;
      const fits=hasLabels && headerLabels.length && itemLabels.every(l=>headerLabels.includes(l));

      let priceHtml;
      if(headerLabels.length && (fits || !hasLabels)){
        // aligned cells under the header columns
        const map={}; pr.forEach(pp=>{ if(pp.label) map[pp.label]=pp.value; });
        if(!hasLabels && pr.length===1){
          // single unlabeled price → put in last column
          priceHtml='<div class="cells">'+headerLabels.map((l,i)=>i===headerLabels.length-1
            ?'<span class="c">'+esc(pr[0].value)+'</span>':'<span class="c dash">–</span>').join('')+'</div>';
        } else {
          priceHtml='<div class="cells">'+headerLabels.map(l=> map[l]!==undefined
            ?'<span class="c">'+esc(map[l])+'</span>':'<span class="c dash">–</span>').join('')+'</div>';
        }
      } else if(hasLabels){
        // irregular labels (e.g. S/D inside an M/L category) → inline chips
        priceHtml='<div class="inline">'+pr.map(pp=>pp.label?'<span class="pp"><b>'+esc(pp.label)+'</b>'+esc(pp.value)+'</span>':'<span class="pp">'+esc(pp.value)+'</span>').join('')+'</div>';
      } else {
        // no header at all → single value right-aligned
        priceHtml='<div class="cells"><span class="c">'+esc(pr.length?pr[0].value:'')+'</span></div>';
      }

      const row=document.createElement('div'); row.className='item';
      row.innerHTML='<div class="nm"><div class="na">'+esc(primary)+'</div>'+(secondary?'<div class="ne">'+esc(secondary)+'</div>':'')+'</div>'+priceHtml;
      list.appendChild(row);
    });
    sec.appendChild(list);
    menu.appendChild(sec);
    sections.push(sec);
  }

  SECTIONS.forEach(section=>{
    const secCats=CATS.filter(c=>c.s===section.id);
    const banner=document.createElement('div'); banner.className='band'; banner.id=secSlug[section.id];
    banner.innerHTML='<h2>'+esc(section.en||section.ar)+'</h2><div class="ar">'+esc(section.ar)+'</div>';
    menu.appendChild(banner);
    const hasItems=secCats.some(c=>PRODUCTS.some(p=>p.c===c.id));
    if(!hasItems){ const soon=document.createElement('div'); soon.className='soon'; soon.textContent='☕ '+(section.en||section.ar)+' — Coming soon'; menu.appendChild(soon); return; }
    secCats.forEach(renderCategory);
  });

  let activeId=null;
  function setActive(slug){ if(slug===activeId) return; activeId=slug; for(const k in navLinks) navLinks[k].classList.toggle('active',k===slug); const a=navLinks[slug]; if(a) a.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'}); setHash(slug); }
  const spy=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting) setActive(e.target.id);});},{rootMargin:'-42% 0px -52% 0px',threshold:0});
  sections.forEach(s=>spy.observe(s));
  nav.addEventListener('click',e=>{const a=e.target.closest('a'); if(a&&a.dataset.slug){ e.preventDefault(); setActive(a.dataset.slug); goTo(a.dataset.slug); }});

  const tabsEl=document.getElementById('tabs'); tabsEl.innerHTML=''; const tabBtns={};
  SECTIONS.forEach(section=>{
    if(!CATS.some(c=>c.s===section.id && PRODUCTS.some(p=>p.c===c.id))) return;
    const b=document.createElement('button'); b.textContent=section.en||section.ar; b.dataset.sec=section.id;
    b.addEventListener('click',()=>{ goTo(secSlug[section.id]); setTab(section.id); });
    tabBtns[section.id]=b; tabsEl.appendChild(b);
  });
  function setTab(id){ for(const k in tabBtns) tabBtns[k].classList.toggle('active',k===id); }
  const firstTab=Object.keys(tabBtns)[0]; if(firstTab) setTab(firstTab);
  const secSpy=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){ const sid=slugSec[e.target.id]; if(sid) setTab(sid); }});},{rootMargin:'0px 0px -76% 0px',threshold:0});
  document.querySelectorAll('.band').forEach(el=>secSpy.observe(el));

  // deep-link: honor initial hash, else highlight first category
  const initial=(location.hash||'').replace(/^#/,'');
  if(initial && initial!=='admin' && document.getElementById(initial)){
    setTimeout(()=>{ const el=document.getElementById(initial); if(el) el.scrollIntoView({block:'start'}); }, 60);
  } else if(sections[0]){ setActive(sections[0].id); }

  if(location.hash==='#admin') addExportLink(data);
}

function addExportLink(data){
  const footer=document.querySelector('footer');
  const btn=document.createElement('button'); btn.className='exp'; btn.textContent='📄 Download Sheet CSV';
  btn.onclick=()=>downloadCSV(data); footer.appendChild(btn);
}
function csvCell(v){ const s=String(v==null?'':v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function downloadCSV(data){
  const catMap={}; data.CATS.forEach(c=>catMap[c.id]=c); const secMap={}; data.SECTIONS.forEach(s=>secMap[s.id]=s);
  const rows=[['section','category_ar','category_en','name_ar','name_en','prices','available']];
  data.PRODUCTS.forEach(p=>{ const cat=catMap[p.c]||{}; const sec=secMap[cat.s]||{}; rows.push([sec.en||cat.s||'',cat.ar||'',cat.en||'',p.ar||'',p.en||'',p.pr||'','yes']); });
  const csv='﻿'+rows.map(r=>r.map(csvCell).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='almoatamd-menu.csv'; a.click(); URL.revokeObjectURL(a.href);
}
