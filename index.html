<style>
  :root{
    --maroon:#6d1224;
    --maroon2:#8a1c2e;
    --teal:#15535d;
    --teal2:#0f3f47;
    --warm:#e2a17c;
    --cream:#fbf6f0;
    --ink:#33292a;
    --muted:#9c8478;
    --line:#ecdbcb;
    --card:#fffdfb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Quicksand','Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    background:linear-gradient(180deg,#fdf9f4 0%, #f8ecdf 48%, #f0d8c5 100%) fixed;
    min-height:100vh;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 18px 60px}

  /* ===== Header / brand ===== */
  header{text-align:center;padding:44px 16px 26px}
  .logo{width:96px;height:96px;margin:0 auto 12px;color:var(--maroon);
    filter:drop-shadow(0 6px 14px rgba(109,18,36,.22))}
  .logo svg{width:100%;height:100%;display:block}
  .brand-ar{font-family:'Cairo',sans-serif;font-weight:800;font-size:1.5rem;color:var(--maroon);letter-spacing:2px;margin-bottom:-2px}
  .brand-en{font-family:'Poppins',sans-serif;font-weight:800;font-size:2.5rem;letter-spacing:6px;
    color:var(--maroon);line-height:1.05}
  .tagline{font-family:'Poppins',serif;font-style:italic;color:var(--warm);font-weight:600;
    letter-spacing:1px;font-size:.9rem;margin-top:6px}
  .handle{display:inline-block;margin-top:12px;color:var(--teal);font-weight:700;font-size:.82rem;
    background:rgba(21,83,93,.08);padding:5px 14px;border-radius:999px;letter-spacing:.5px}
  @media(min-width:560px){ .brand-en{font-size:3rem} .logo{width:110px;height:110px} }

  /* ===== Sticky tabs + nav ===== */
  .topbar{position:sticky;top:0;z-index:30;
    background:rgba(253,249,244,.94);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);margin-bottom:26px}
  .tabs{display:flex;justify-content:center;gap:10px;padding:12px 14px 8px}
  .tabs button{flex:0 0 auto;min-width:130px;font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:700;
    letter-spacing:2px;cursor:pointer;color:var(--maroon);background:transparent;
    border:1.6px solid rgba(109,18,36,.32);border-radius:999px;padding:9px 24px;transition:.2s}
  .tabs button:hover{border-color:var(--maroon)}
  .tabs button.active{color:#fff;background:linear-gradient(180deg,var(--maroon2),var(--maroon));
    border-color:var(--maroon);box-shadow:0 6px 16px rgba(109,18,36,.32)}
  nav{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding:4px 14px 12px;
    scrollbar-width:thin;scrollbar-color:var(--warm) transparent;-webkit-overflow-scrolling:touch}
  nav::-webkit-scrollbar{height:5px}
  nav::-webkit-scrollbar-thumb{background:var(--warm);border-radius:10px}
  nav a{flex:0 0 auto;color:var(--teal);text-decoration:none;font-weight:700;font-size:.86rem;
    padding:7px 15px;border:1px solid var(--line);border-radius:999px;white-space:nowrap;
    background:var(--card);transition:.2s}
  nav a:hover{border-color:var(--warm)}
  nav a.active{color:#fff;background:var(--teal);border-color:var(--teal)}

  /* ===== Section band ===== */
  .band{max-width:1120px;margin:6px auto 26px;padding:24px 20px;border-radius:20px;text-align:center;
    color:#fff;scroll-margin-top:120px;
    background:linear-gradient(115deg,var(--maroon) 0%, var(--maroon2) 42%, var(--warm) 115%);
    box-shadow:0 12px 30px rgba(109,18,36,.22)}
  .band h2{font-family:'Poppins',sans-serif;font-weight:800;letter-spacing:5px;font-size:1.9rem}
  .band .ar{font-family:'Cairo',sans-serif;font-weight:700;opacity:.92;font-size:1rem;margin-top:2px}
  @media(min-width:1156px){ .band{margin-inline:auto} }

  /* ===== Category ===== */
  .cat{margin-bottom:34px;scroll-margin-top:112px}
  .cat-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
  .cat-head .ar{font-family:'Cairo',sans-serif;font-weight:800;font-size:1.5rem;color:var(--maroon);white-space:nowrap}
  .cat-head .en{font-family:'Poppins',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:2px;
    color:var(--warm);text-transform:uppercase;white-space:nowrap}
  .cat-head .line{flex:1;height:2px;border-radius:2px;
    background:linear-gradient(90deg,rgba(109,18,36,.35),transparent)}

  .items{display:grid;grid-template-columns:1fr;gap:0 42px}
  @media(min-width:760px){ .items{grid-template-columns:1fr 1fr} }

  .item{display:flex;align-items:baseline;gap:12px;padding:10px 4px;
    border-bottom:1px dashed var(--line)}
  .item .nm{flex:1;min-width:0}
  .item .na{font-family:'Quicksand','Cairo',sans-serif;font-weight:700;font-size:1.02rem;color:var(--teal);line-height:1.3}
  .item .ne{font-size:.72rem;color:var(--muted);margin-top:1px;letter-spacing:.2px}
  .item .prices{display:flex;gap:14px;white-space:nowrap;align-items:baseline}
  .pp{font-family:'Poppins',sans-serif;color:var(--teal);font-weight:700;font-size:1.02rem}
  .pp b{color:var(--maroon);font-weight:800;font-size:.58rem;letter-spacing:.5px;margin-inline-end:3px;
    vertical-align:middle;opacity:.85}

  .soon{max-width:1120px;margin:0 18px 40px;padding:30px 18px;text-align:center;color:var(--muted);
    border:1px dashed var(--line);border-radius:16px;font-weight:600}

  .status{text-align:center;color:var(--muted);padding:60px 16px;font-weight:600}
  .status .spin{width:32px;height:32px;margin:0 auto 14px;border-radius:50%;
    border:3px solid var(--line);border-top-color:var(--maroon);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{text-align:center;color:var(--muted);font-size:.84rem;padding:36px 16px 12px;
    border-top:1px solid var(--line);margin-top:24px}
  footer b{color:var(--maroon)}
  footer .exp{display:inline-block;margin-top:12px;color:var(--muted);font-size:.76rem;
    text-decoration:underline;cursor:pointer;background:none;border:0;font-family:inherit}
  footer .exp:hover{color:var(--maroon)}

  @media(max-width:559px){
    .wrap{padding:0 13px 40px}
    header{padding:30px 14px 18px}
    .brand-en{font-size:2.1rem;letter-spacing:4px}
    .band h2{font-size:1.5rem;letter-spacing:3px}
    .cat-head .ar{font-size:1.2rem}
    .tabs button{min-width:0;flex:1 1 0;padding:9px 12px;letter-spacing:1px}
    .item{padding:9px 3px}
    .item .na{font-size:.94rem}
    .pp{font-size:.94rem}
    .item .prices{gap:10px}
  }
</style>

const DEFAULT_DATA = { SECTIONS:DEFAULT_SECTIONS, CATS:DEFAULT_CATS, PRODUCTS:DEFAULT_PRODUCTS };

/* ============================================================
   قراءة البيانات من جوجل شيت
   ============================================================ */
function buildUrl(){
  const bust = '_cb=' + Date.now();
  if(CONFIG.SHEET_CSV_URL) return CONFIG.SHEET_CSV_URL + (CONFIG.SHEET_CSV_URL.includes('?')?'&':'?') + bust;
  if(CONFIG.SHEET_ID) return 'https://docs.google.com/spreadsheets/d/'+CONFIG.SHEET_ID+
    '/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(CONFIG.SHEET_NAME||'')+'&'+bust;
  return '';
}

function parseCSV(text){
  const rows=[]; let row=[]; let field=''; let inQ=false;
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQ=false; }
      else field+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===','){ row.push(field); field=''; }
      else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=ch;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(c=>(c||'').trim()!==''));
}

function normHeader(h){ return (h||'').trim().toLowerCase().replace(/[\s_\-]+/g,''); }
const FIELD_OF = {
  'section':'section','sec':'section','القسم':'section','القسمالرئيسي':'section',
  'category':'category_ar','categoryar':'category_ar','cat':'category_ar','التصنيف':'category_ar','الصنف':'category_ar','المجموعة':'category_ar',
  'categoryen':'category_en','categoryenglish':'category_en',
  'name':'name_ar','namear':'name_ar','الاسم':'name_ar','المنتج':'name_ar','الاسمعربي':'name_ar',
  'nameen':'name_en','english':'name_en','nameenglish':'name_en','الاسمانجليزي':'name_en',
  'prices':'prices','price':'prices','p':'prices','السعر':'prices','الاسعار':'prices','الأسعار':'prices',
  'available':'available','avail':'available','متاح':'available','الحالة':'available','status':'available',
};

function isHidden(v){
  if(!v) return false;
  const n=v.trim().toLowerCase().replace(/\s+/g,'');
  return ['no','false','0','hide','hidden','off','لا','مخفي','مخفى','غيرمتاح','stop'].includes(n);
}

function normSection(v){
  const raw=(v||'').trim(); const n=raw.toLowerCase();
  if(n==='beans'||raw.includes('بن')||raw.includes('حبوب')||raw.includes('قهوة محمصة')) return {id:'beans', ar:'حبوب البُن', en:'BEANS'};
  if(n==='drinks'||n==='drink'||raw.includes('مشروب')||raw.includes('مشروبات')) return {id:'drinks', ar:'المشروبات', en:'DRINKS'};
  if(!raw) return {id:'drinks', ar:'المشروبات', en:'DRINKS'};
  return {id:'sec_'+n.replace(/\s+/g,'_'), ar:raw, en:raw.toUpperCase()};
}

function rowsToData(rows){
  if(!rows||rows.length<2) return null;
  const header=rows[0].map(normHeader);
  const idx={};
  header.forEach((h,i)=>{ const f=FIELD_OF[h]; if(f&&idx[f]===undefined) idx[f]=i; });
  if(idx.name_ar===undefined && idx.name_en===undefined) return null;

  const sectionsMap=new Map(); const cats=[]; const catKey=new Map(); const products=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const get=f=>(idx[f]!==undefined?(row[idx[f]]||''):'').trim();
    const nameAr=get('name_ar'), nameEn=get('name_en');
    if(!nameAr && !nameEn) continue;
    if(isHidden(get('available'))) continue;

    const sec=normSection(get('section')||'drinks');
    if(!sectionsMap.has(sec.id)) sectionsMap.set(sec.id, sec);

    const catAr=get('category_ar')||'أخرى'; const catEn=get('category_en');
    const key=sec.id+'||'+catAr;
    let catId=catKey.get(key);
    if(!catId){ catId='c'+cats.length; catKey.set(key,catId); cats.push({id:catId, s:sec.id, ar:catAr, en:catEn}); }

    products.push({c:catId, ar:nameAr, en:nameEn, pr:get('prices')});
  }
  if(!products.length) return null;
  return {SECTIONS:[...sectionsMap.values()], CATS:cats, PRODUCTS:products};
}

async function loadData(){
  const url=buildUrl();
  if(!url) return DEFAULT_DATA;
  try{
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=rowsToData(parseCSV(await res.text()));
    return data||DEFAULT_DATA;
  }catch(e){
    console.warn('تعذّر تحميل جوجل شيت — عرض البيانات الافتراضية.', e);
    return DEFAULT_DATA;
  }
}

/* ============================================================
   عرض المنيو
   ============================================================ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parsePrices(str){
  if(str==null) return [];
  return String(str).split('|').map(s=>s.trim()).filter(Boolean).map(seg=>{
    const parts=seg.split(/\s+/);
    if(parts.length>=2) return {label:parts.slice(0,-1).join(' '), value:parts[parts.length-1]};
    return {label:'', value:parts[0]};
  }).filter(x=>x.value && x.value!=='-');
}

function initMenu(data){
  const SECTIONS=data.SECTIONS, CATS=data.CATS, PRODUCTS=data.PRODUCTS;
  const nav=document.getElementById('nav');
  const menu=document.getElementById('menu');
  menu.innerHTML='';
  const navLinks={}; const sections=[];

  function renderCategory(cat){
    const items=PRODUCTS.filter(p=>p.c===cat.id);
    if(!items.length) return;

    const a=document.createElement('a');
    a.href='#cat-'+cat.id; a.textContent=cat.ar; a.dataset.cat=cat.id;
    navLinks[cat.id]=a; nav.appendChild(a);

    const sec=document.createElement('section');
    sec.className='cat'; sec.id='cat-'+cat.id;
    const head=document.createElement('div');
    head.className='cat-head';
    head.innerHTML='<span class="ar">'+esc(cat.ar)+'</span>'+(cat.en?'<span class="en">'+esc(cat.en)+'</span>':'')+'<span class="line"></span>';
    sec.appendChild(head);

    const list=document.createElement('div');
    list.className='items';
    items.forEach(p=>{
      const primary=p.ar||p.en||''; const secondary=p.ar?(p.en||''):'';
      const priceHtml=parsePrices(p.pr).map(x=>x.label
        ? '<span class="pp"><b>'+esc(x.label)+'</b>'+esc(x.value)+'</span>'
        : '<span class="pp">'+esc(x.value)+'</span>').join('');
      const row=document.createElement('div');
      row.className='item';
      row.innerHTML='<div class="nm"><div class="na">'+esc(primary)+'</div>'+
        (secondary?'<div class="ne">'+esc(secondary)+'</div>':'')+'</div>'+
        '<div class="prices">'+priceHtml+'</div>';
      list.appendChild(row);
    });
    sec.appendChild(list);
    menu.appendChild(sec);
    sections.push(sec);
  }

  SECTIONS.forEach(section=>{
    const secCats=CATS.filter(c=>c.s===section.id);
    const banner=document.createElement('div');
    banner.className='band'; banner.id='sec-'+section.id;
    banner.innerHTML='<h2>'+esc(section.en||section.ar)+'</h2><div class="ar">'+esc(section.ar)+'</div>';
    menu.appendChild(banner);

    const hasItems=secCats.some(c=>PRODUCTS.some(p=>p.c===c.id));
    if(!hasItems){
      const soon=document.createElement('div');
      soon.className='soon'; soon.textContent='☕ '+(section.ar)+' — قريبًا';
      menu.appendChild(soon); return;
    }
    secCats.forEach(renderCategory);
  });

  /* تظليل التصنيف أثناء التمرير */
  let activeId=null;
  function setActive(id){
    if(id===activeId) return; activeId=id;
    for(const k in navLinks) navLinks[k].classList.toggle('active', k===id);
    const a=navLinks[id]; if(a) a.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }
  const spy=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting) setActive(e.target.id.replace('cat-',''));});},
    {rootMargin:'-42% 0px -52% 0px',threshold:0});
  sections.forEach(s=>spy.observe(s));
  if(sections[0]) setActive(sections[0].id.replace('cat-',''));
  nav.addEventListener('click',e=>{const a=e.target.closest('a'); if(a&&a.dataset.cat) setActive(a.dataset.cat);});

  /* تابات BEANS / DRINKS */
  const tabsEl=document.getElementById('tabs'); tabsEl.innerHTML='';
  const tabBtns={};
  SECTIONS.forEach(section=>{
    if(!CATS.some(c=>c.s===section.id && PRODUCTS.some(p=>p.c===c.id))) return;
    const b=document.createElement('button');
    b.textContent=section.en||section.ar; b.dataset.sec=section.id;
    b.addEventListener('click',()=>{const banner=document.getElementById('sec-'+section.id); if(banner) banner.scrollIntoView({behavior:'smooth',block:'start'}); setTab(section.id);});
    tabBtns[section.id]=b; tabsEl.appendChild(b);
  });
  function setTab(id){ for(const k in tabBtns) tabBtns[k].classList.toggle('active', k===id); }
  const firstTab=Object.keys(tabBtns)[0]; if(firstTab) setTab(firstTab);
  const secSpy=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting) setTab(e.target.id.replace('sec-',''));});},
    {rootMargin:'0px 0px -76% 0px',threshold:0});
  document.querySelectorAll('.band').forEach(el=>secSpy.observe(el));

  if(location.hash==='#admin') addExportLink(data);
}

/* تصدير الشيت */
function addExportLink(data){
  const footer=document.querySelector('footer');
  const btn=document.createElement('button');
  btn.className='exp'; btn.textContent='📄 تنزيل ملف الشيت (CSV)';
  btn.onclick=()=>downloadCSV(data);
  footer.appendChild(document.createElement('br')); footer.appendChild(btn);
}
function csvCell(v){ const s=String(v==null?'':v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function downloadCSV(data){
  const catMap={}; data.CATS.forEach(c=>catMap[c.id]=c);
  const secMap={}; data.SECTIONS.forEach(s=>secMap[s.id]=s);
  const rows=[['section','category_ar','category_en','name_ar','name_en','prices','available']];
  data.PRODUCTS.forEach(p=>{
    const cat=catMap[p.c]||{}; const sec=secMap[cat.s]||{};
    rows.push([ sec.en||cat.s||'', cat.ar||'', cat.en||'', p.ar||'', p.en||'', p.pr||'', 'yes' ]);
  });
  const csv='﻿'+rows.map(r=>r.map(csvCell).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='almoatamd-menu.csv'; a.click(); URL.revokeObjectURL(a.href);
}

loadData().then(initMenu);
